databases:
  - name: phishguard-db
    plan: free
    databaseName: phishguard
    user: phishguard_user

services:
  - type: web
    name: phishguard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: phishguard-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11
